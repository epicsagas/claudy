[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "msi"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# macOS code signing (requires Apple Developer certificate)
# Enable when cert is available:
#   1. Add secrets: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   2. Set macos-sign = false
macos-sign = false
# macOS notarization (requires Apple Developer account + app-specific password)
# Skip checking whether the specified configuration files are up to date
allow-dirty = ["ci"]
# Generate and dist a source tarball
source-tarball = false
# Features to pass to cargo build
features = ["analytics", "analytics-ui"]

# Linux GTK system dependencies for Tauri
[dist.dependencies.apt]
libgtk-3-dev = '*'
libwebkit2gtk-4.1-dev = '*'
libappindicator3-dev = '*'
librsvg2-dev = '*'
patchelf = '*'
